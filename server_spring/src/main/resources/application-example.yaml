spring:
  application:
    name: server

  main:
    allow-bean-definition-overriding: true

  ai:
    openai:
      api-key: { openApi-key }
      base-url: https://api.groq.com/openai/v1
      chat:
        options:
          model: { model }

  datasource:
    url: { url }
    username: { db username }
    password: { db password }

  sql:
    init:
      schema-locations: classpath:init/schema.sql
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
